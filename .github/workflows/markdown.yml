name: Markdown

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".github/workflows/markdown.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint Markdown
        run: |
          npx --yes markdownlint-cli2 \
            "docs/books/complete/**/*.md" \
            "docs/index.md" \
            "docs/cli-reference.md" \
            "prompts/*.md" \
            "checklists/*.md" \
            "templates/*.md" \
            "examples/case-studies/*.md" \
            "README.md"
